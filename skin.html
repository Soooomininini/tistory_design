<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>[##_page_title_##]</title>
    <link
      rel="alternate"
      type="application/rss+xml"
      title="[##_title_##]"
      href="[##_rss_url_##"
      ]
    />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.2/css/all.min.css"
    />
    <!--[if lt IE 9]>
      <script src="//t1.daumcdn.net/tistory_admin/lib/jquery/jquery-1.12.4.min.js"></script>
    <![endif]-->
    <!--[if gte IE 9]><!-->
    <script src="//t1.daumcdn.net/tistory_admin/lib/jquery/jquery-3.2.1.min.js"></script>
    <!--<![endif]-->
  </head>
  <body id="[##_body_id_##]">
    <s_t3>
      <div class="contentWrap">
        <div id="container">
          <div id="header">
            <div class="global-wrap">
              <h1 class="blog-title">
                <a href="https://soomingworld.tistory.com/">[##_title_##]</a>
              </h1>
              <div class="header-nav">
                <ul>
                  <li class="search">
                    <div class="area_search">
                      <form
                        action="#"
                        method="get"
                        class="frm_search"
                        onsubmit="[##_search_onclick_submit_##]"
                      >
                        <fieldset>
                          <legend class="sr-only">검색하기 폼</legend>
                          <input
                            type="text"
                            name="[##_search_name_##]"
                            value="[##_search_text_##]"
                            class="search-input"
                            title="검색하기"
                            placeholder="Search"
                          />
                          <button type="button" class="btn-search">
                            <i class="fa fa-search fa-lg" id="btnSearch"></i>
                          </button>
                        </fieldset>
                      </form>
                    </div>
                  </li>
                  <li class="taglog">
                    <a href="[##_taglog_link_##]" title="태그"
                      ><i class="fa fa-tags fa-lg"></i
                    ></a>
                  </li>
                  <li class="localog">
                    <a href="[##_location_link_##]" title="위치로그"
                      ><i class="fa fa-map-marker fa-lg"></i
                    ></a>
                  </li>
                  <li class="guestBook">
                    <a href="[##_guestBook_link_##" title="방명록"
                      ><i class="fa fa-book fa-lg"></i
                    ></a>
                  </li>
                  <li class="rss">
                    <a
                      href="[##_rss_url_##]"
                      onclick="window.open(this.href); return false"
                      title="rss"
                      ><i class="fa fa-rss fa-lg"></i
                    ></a>
                  </li>
                </ul>
              </div>
              <!--header-nav close-->
            </div>
            <!--global wrap close-->
          </div>
          <!--header close-->
          <div id="content_sidebar_wrap">
            <div id="content">
              <div class="searchList">11.검색 결과 리스트</div>
              <div class="searchRplist">12.검색 결과 댓글 리스트</div>
              <div class="localog">13.위치 로그</div>
              <div class="taglog">14.태그 클라우드</div>

              <div class="guestBook">
                15.방명록
                <div class="guestWrite">15-1. 방명록 글쓰기</div>
                <div class="guestList">15-2. 방명록 리스트</div>
              </div>
              <!--guestBook close-->
              <div class="entryNotice">16.공지사항 글</div>
              <div class="entryProtected">17.보호 글</div>
              <div class="entry">
                18.글
                <div class="titleWrap">
                  18-1. 글 제목, 카테고리, 작성이르 글 관리
                </div>
                <div class="article">18-2. 글</div>
                <div class="tagTrail">18-3. 글 관련 태그</div>
                <div class="actionTrail">18-4.트랙백, 댓글</div>
                <div class="trackback">18-5.트랙백</div>
                <div class="code_comment">
                  18-6.댓글
                  <div class="code_commentList">18-6-1.댓글 리스트</div>
                  <div class="code_commentWrite">18-6-2.댓글 쓰기</div>
                </div>
              </div>
              <!--entry close-->
              <div class="entry">19.페이지</div>
            </div>
            <!--content close-->
            <div id="sidebar">#sidebar</div>

            <!--sidebar close-->
          </div>
          <!--content_sidebar_wrap close-->
          <div id="footer">#footer</div>
          <!--footer close-->
        </div>
        <!--container close-->
      </div>
      <!--contentWrap close-->
    </s_t3>
    <script src="./images/script.js"></script>
  </body>
</html>
